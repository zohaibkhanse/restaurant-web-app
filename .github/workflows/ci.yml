name: React CI

on:
  push:
    branches:
      - develop
      - "feature/**"

  pull_request:
    branches:
      - develop

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.17.1

      - name: Install Dependencies
        run: npm install
        
      - name: Run Build
        run: npm run build